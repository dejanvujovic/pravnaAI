# nginx site config za frontend kontejner.
#
# Servira Vite static bundle iz /usr/share/nginx/html, plus radi kao
# reverse proxy za /api/* ka backend kontejneru. Backend i frontend
# se nalaze u istoj docker compose mreži, pa nginx zna backend po
# imenu servisa (`backend:4000`).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — sve nepoznate rute idu na index.html da bi
    # react-router preuzeo navigaciju (npr. /razgovor/:id, /document/:id).
    location / {
        try_files $uri /index.html;
    }

    # Cache za statičke asset-e koje Vite imenuje sa content hash-om.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /api/* → backend. SSE za /api/qna zahtijeva da nginx ne baferuje
    # response stream i da ima dovoljno dug read timeout (Claude odgovor
    # može trajati > 60s za duga pitanja).
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — disable buffering i caching, produži timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # PDF/DOCX upload do 50 MB (vidi backend MAX_FILE_SIZE_MB).
    client_max_body_size 60M;
}

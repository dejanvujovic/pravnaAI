services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rtcg-legal-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-rtcg}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_local_only}
      POSTGRES_DB: ${PGDATABASE:-rtcg_legal_ai}
    # Bind samo na 127.0.0.1 — Postgres treba da bude dostupan host-side
    # skriptama (db:psql, db:migrate u dev modu), ali ne i spolja. U
    # Portainer/produkcija setup-u backend mu pristupa kroz internu docker
    # mrežu (host: postgres), ne kroz exposed port.
    ports:
      - "127.0.0.1:${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-rtcg} -d ${PGDATABASE:-rtcg_legal_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  embeddings:
    build:
      context: ./embeddings
    container_name: rtcg-legal-ai-embeddings
    restart: unless-stopped
    ports:
      - "127.0.0.1:${EMBEDDINGS_PORT:-8001}:8001"
    volumes:
      - embeddings-cache:/cache
    environment:
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_MAX_BATCH: "32"
      LOG_LEVEL: INFO

  ocr:
    build:
      context: ./ocr
    container_name: rtcg-legal-ai-ocr
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OCR_PORT:-8002}:8002"
    environment:
      OCR_LANGS: ${TESSERACT_LANGS:-srp+srp_latn}
      OCR_DPI: ${OCR_DPI:-300}
      OCR_PSM: "3"
      LOG_LEVEL: INFO

  # ---------------------------------------------------------------------------
  # Backend i frontend — koriste se u Portainer/produkcija stack-u. U dev
  # modu se najčešće preskaču (`docker compose up postgres embeddings ocr`)
  # i pokreću direktno preko `npm run dev:backend` / `npm run dev:frontend`.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rtcg-legal-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_started
      ocr:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PGUSER:-rtcg}
      PGPASSWORD: ${PGPASSWORD:-changeme_local_only}
      PGDATABASE: ${PGDATABASE:-rtcg_legal_ai}
      EMBEDDINGS_URL: http://embeddings:8001
      OCR_URL: http://ocr:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      UPLOADS_DIR: /app/data/uploads
    volumes:
      - backend-uploads:/app/data/uploads
    expose:
      - "4000"
    profiles:
      - app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rtcg-legal-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
    profiles:
      - app

volumes:
  postgres-data:
    name: rtcg-legal-ai-postgres-data
  embeddings-cache:
    name: rtcg-legal-ai-embeddings-cache
  backend-uploads:
    name: rtcg-legal-ai-backend-uploads

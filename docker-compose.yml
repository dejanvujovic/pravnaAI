services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rtcg-legal-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-rtcg}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_local_only}
      POSTGRES_DB: ${PGDATABASE:-rtcg_legal_ai}
    # Bind samo na 127.0.0.1 — Postgres treba da bude dostupan host-side
    # skriptama (db:psql, db:migrate u dev modu), ali ne i spolja. U
    # Portainer/produkcija setup-u backend mu pristupa kroz internu docker
    # mrežu (host: postgres), ne kroz exposed port.
    ports:
      - "127.0.0.1:${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-rtcg} -d ${PGDATABASE:-rtcg_legal_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  embeddings:
    build:
      context: ./embeddings
    container_name: rtcg-legal-ai-embeddings
    restart: unless-stopped
    ports:
      - "127.0.0.1:${EMBEDDINGS_PORT:-8001}:8001"
    volumes:
      - embeddings-cache:/cache
    environment:
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_MAX_BATCH: "32"
      LOG_LEVEL: INFO
    # Healthcheck: čekaj da `/health` vrati `"status":"ok"` (model učitan u RAM).
    # Image već definiše HEALTHCHECK u Dockerfile-u, ovdje ga ekspozujemo da
    # bude eksplicitno i da backend `depends_on: service_healthy` radi i bez
    # pre-buildovane slike (compose lokalno, bez GHCR-a).
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 600s
      retries: 30

  ocr:
    build:
      context: ./ocr
    container_name: rtcg-legal-ai-ocr
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OCR_PORT:-8002}:8002"
    environment:
      OCR_LANGS: ${TESSERACT_LANGS:-srp+srp_latn}
      OCR_DPI: ${OCR_DPI:-300}
      OCR_PSM: "3"
      LOG_LEVEL: INFO

  # ---------------------------------------------------------------------------
  # Backend i frontend — uvijek u stack-u za Portainer/produkcija. U dev
  # modu se ne dižu kroz `npm run stack:up` (koji eksplicitno bira samo
  # infra servise) — dev pokreće backend i frontend direktno preko
  # `npm run dev:backend` / `npm run dev:frontend`.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rtcg-legal-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      ocr:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PGUSER:-rtcg}
      PGPASSWORD: ${PGPASSWORD:-changeme_local_only}
      PGDATABASE: ${PGDATABASE:-rtcg_legal_ai}
      EMBEDDINGS_URL: http://embeddings:8001
      # Default 10min — CPU embedding na BGE-M3 zna trajati par minuta
      # po batch-u. Snizi (npr. 60000) ako embeddings ima GPU.
      EMBEDDINGS_TIMEOUT_MS: ${EMBEDDINGS_TIMEOUT_MS:-600000}
      # Koliko dokumenata ingest worker procesuje paralelno. Default 1 jer
      # je embeddings sidecar single-process — paralelizam samo dijeli CPU
      # i pravi `fetch failed`. Podigni samo ako embeddings ima GPU.
      INGEST_CONCURRENCY: ${INGEST_CONCURRENCY:-1}
      OCR_URL: http://ocr:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      UPLOADS_DIR: /app/data/uploads
    volumes:
      - backend-uploads:/app/data/uploads
    expose:
      - "4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: rtcg-legal-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

  # Automatski postgres backup — vidi komentare u docker-compose.portainer.yml.
  # U dev mode-u možeš da ga skipuješ: `docker compose up <bez backup>`.
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: rtcg-legal-ai-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${PGDATABASE:-rtcg_legal_ai}
      POSTGRES_USER: ${PGUSER:-rtcg}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_local_only}
      POSTGRES_EXTRA_OPTS: "-Fc"
      SCHEDULE: "${BACKUP_SCHEDULE:-0 3 * * *}"
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-12}
      TZ: ${TZ:-Europe/Podgorica}
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres-backup-data:/backups

volumes:
  postgres-data:
    name: rtcg-legal-ai-postgres-data
  embeddings-cache:
    name: rtcg-legal-ai-embeddings-cache
  backend-uploads:
    name: rtcg-legal-ai-backend-uploads
  postgres-backup-data:
    name: rtcg-legal-ai-postgres-backup-data

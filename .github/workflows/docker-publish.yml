name: Docker publish (GHCR)

# Bilduje i objavljuje sve custom Docker slike na GitHub Container Registry
# (ghcr.io). Cilj: deployment na server (Portainer) bez git fetch-a i bez
# build-a na serveru — Portainer samo povlači gotove `image:`.
#
# Pokreće se na push na main i ručno (workflow_dispatch). Slike se taguju
# sa `latest` i kratkim git SHA.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "shared/**"
      - "embeddings/**"
      - "ocr/**"
      - "db/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: pravnaai-backend
            context: .
            dockerfile: backend/Dockerfile
          - image: pravnaai-frontend
            context: .
            dockerfile: frontend/Dockerfile
          - image: pravnaai-embeddings
            context: ./embeddings
            dockerfile: ./embeddings/Dockerfile
          - image: pravnaai-ocr
            context: ./ocr
            dockerfile: ./ocr/Dockerfile
          - image: pravnaai-postgres
            context: ./db
            dockerfile: ./db/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login na GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tagovi/labele)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

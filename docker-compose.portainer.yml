# Compose za Portainer Web Editor deployment — koristi GOTOVE slike sa
# GHCR-a (ghcr.io), bez `build:` direktiva i bez bind mount-a na repo
# fajlove. Slike gradi GitHub Actions (.github/workflows/docker-publish.yml)
# na svaki push na main.
#
# Korišćenje: paste sadržaj ovog fajla u Portainer Stack → Web editor,
# postavi Environment variables (PGPASSWORD, ANTHROPIC_API_KEY, ...),
# Deploy. Nema git fetch-a, nema build-a na serveru.
#
# Slike su pod `dejanvujovic` ownerom; ako fork-uješ repo, promijeni
# `ghcr.io/dejanvujovic/...` u svoj owner.

services:
  postgres:
    image: ghcr.io/dejanvujovic/pravnaai-postgres:latest
    container_name: rtcg-legal-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-rtcg}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_local_only}
      POSTGRES_DB: ${PGDATABASE:-rtcg_legal_ai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-rtcg} -d ${PGDATABASE:-rtcg_legal_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  embeddings:
    image: ghcr.io/dejanvujovic/pravnaai-embeddings:latest
    container_name: rtcg-legal-ai-embeddings
    restart: unless-stopped
    volumes:
      - embeddings-cache:/cache
    environment:
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_MAX_BATCH: "32"
      LOG_LEVEL: INFO
    # Healthcheck: čekaj da `/health` vrati `"status":"ok"` (model učitan u RAM).
    # Bez ovog backend bi krenuo prije nego sto sidecar bude spreman i prvi
    # ingest pozivi bi pali sa `fetch failed`/503. `start_period` daje 10 min
    # za prvo preuzimanje modela (~1.5 GB sa HuggingFace), retries su
    # konzervativne za sporu mrežu.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8001/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 600s
      retries: 30

  ocr:
    image: ghcr.io/dejanvujovic/pravnaai-ocr:latest
    container_name: rtcg-legal-ai-ocr
    restart: unless-stopped
    environment:
      OCR_LANGS: ${TESSERACT_LANGS:-srp+srp_latn}
      OCR_DPI: ${OCR_DPI:-300}
      OCR_PSM: "3"
      LOG_LEVEL: INFO

  backend:
    image: ghcr.io/dejanvujovic/pravnaai-backend:latest
    container_name: rtcg-legal-ai-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      embeddings:
        condition: service_healthy
      ocr:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "4000"
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${PGUSER:-rtcg}
      PGPASSWORD: ${PGPASSWORD:-changeme_local_only}
      PGDATABASE: ${PGDATABASE:-rtcg_legal_ai}
      EMBEDDINGS_URL: http://embeddings:8001
      # Default 10min — CPU embedding na BGE-M3 zna trajati par minuta
      # po batch-u. Snizi (npr. 60000) ako embeddings dobije GPU.
      EMBEDDINGS_TIMEOUT_MS: ${EMBEDDINGS_TIMEOUT_MS:-600000}
      # Koliko dokumenata ingest worker procesuje paralelno. Default 1 jer
      # je embeddings sidecar single-process — paralelizam samo dijeli CPU
      # i pravi `fetch failed`. Podigni samo ako embeddings ima GPU.
      INGEST_CONCURRENCY: ${INGEST_CONCURRENCY:-1}
      OCR_URL: http://ocr:8002
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      UPLOADS_DIR: /app/data/uploads
    volumes:
      - backend-uploads:/app/data/uploads
    expose:
      - "4000"

  frontend:
    image: ghcr.io/dejanvujovic/pravnaai-frontend:latest
    container_name: rtcg-legal-ai-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

  # Automatski postgres backup — pg_dump u 03:00 svake noći, sa rotacijom.
  # Backupi žive u zasebnom volumenu `postgres-backup-data` koji preživi
  # stack redeploy. Korisnik može da ih download-uje kroz Portainer
  # (Volumes → browse) ili kroz privremeni helper kontejner.
  #
  # Vidi docs/BACKUP.md za detalje (restore procedura, off-server kopija).
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: rtcg-legal-ai-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${PGDATABASE:-rtcg_legal_ai}
      POSTGRES_USER: ${PGUSER:-rtcg}
      POSTGRES_PASSWORD: ${PGPASSWORD:-changeme_local_only}
      # `-Fc` = custom format (kompresovan, podržava paralelni restore).
      POSTGRES_EXTRA_OPTS: "-Fc"
      # Cron format: "min hour day month weekday". 03:00 svaki dan.
      SCHEDULE: "${BACKUP_SCHEDULE:-0 3 * * *}"
      # Retencija: 7 daily, 4 weekly, 12 monthly. Volume oko 1 GB/godina
      # za pilot veličinu.
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-12}
      # Time zone za cron i naming fajlova. Europe/Podgorica.
      TZ: ${TZ:-Europe/Podgorica}
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres-backup-data:/backups

volumes:
  postgres-data:
    name: rtcg-legal-ai-postgres-data
  embeddings-cache:
    name: rtcg-legal-ai-embeddings-cache
  backend-uploads:
    name: rtcg-legal-ai-backend-uploads
  postgres-backup-data:
    name: rtcg-legal-ai-postgres-backup-data
